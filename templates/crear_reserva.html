{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="bg-gray-900/50 backdrop-blur-md border border-gray-800/80 rounded-2xl overflow-hidden p-8 shadow-[0_0_30px_rgba(0,255,136,0.1)] relative">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-neon via-green-400 to-transparent"></div>
        
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-white mb-2">Reservar <span class="text-neon">{{ cancha.nombre }}</span></h2>
            <p class="text-gray-400 flex items-center gap-2">
                <svg class="w-4 h-4 text-neon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                {{ cancha.ubicacion }}
            </p>
        </div>



        <form method="POST" action="{% url 'negocio:crear_reserva' cancha.id %}" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-300">Fecha</label>
                    <input type="text" name="fecha" id="id_fecha" required 
                           class="w-full bg-dark border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-neon focus:ring-1 focus:ring-neon transition duration-300"
                           placeholder="Seleccione la fecha...">
                </div>
                
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-300">Hora de Inicio (slots disponibles)</label>
                    <select name="hora" id="hora-select" required
                           class="w-full bg-dark border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-neon focus:ring-1 focus:ring-neon transition duration-300">
                        <option value="">Seleccione una fecha primero</option>
                    </select>
                </div>
            </div>

            <div class="bg-dark/50 p-4 rounded-xl border border-gray-800 flex justify-between items-center">
                <span class="text-gray-400">Total a pagar:</span>
                <span class="text-2xl font-bold text-neon">$ {{ cancha.precio|floatformat:"0" }} COP</span>
            </div>

            <div class="flex gap-4 pt-4 border-t border-gray-800">
                <a href="{% url 'dashboard' %}" class="flex-1 text-center py-3 px-4 rounded-xl border border-gray-700 text-gray-300 hover:bg-gray-800 hover:text-white transition duration-300">
                    Cancelar
                </a>
                <button type="submit" class="flex-1 relative overflow-hidden bg-gray-800 text-white font-bold py-3 px-4 rounded-xl border border-gray-700 hover:border-neon transition-all duration-300 group">
                    <div class="absolute inset-0 bg-neon origin-left scale-x-0 group-hover:scale-x-100 transition-transform duration-300 ease-out"></div>
                    <span class="relative z-10 group-hover:text-black transition-colors duration-300">Confirmar Reserva</span>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Flatpickr CSS & JS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const fechaInput = document.getElementById('id_fecha');
    const horaSelect = document.getElementById('hora-select');
    const canchaId = {{ cancha.id }};

    function cargarHorarios(dateStr) {
        if(!dateStr) {
            horaSelect.innerHTML = '<option value="">Seleccione una fecha primero</option>';
            return;
        }
        
        horaSelect.innerHTML = '<option value="">Cargando horarios...</option>';
        
        fetch(`/canchas/${canchaId}/slots/?fecha=${dateStr}`)
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    horaSelect.innerHTML = `<option value="">Error: ${data.error}</option>`;
                    return;
                }
                
                if(data.slots && data.slots.length > 0) {
                    horaSelect.innerHTML = '<option value="">Seleccione un horario</option>';
                    data.slots.forEach(slot => {
                        const opt = document.createElement('option');
                        opt.value = slot;
                        opt.textContent = slot;
                        horaSelect.appendChild(opt);
                    });
                } else {
                    horaSelect.innerHTML = '<option value="">No hay horarios disponibles en esta fecha</option>';
                }
            })
            .catch(err => {
                horaSelect.innerHTML = '<option value="">Error al cargar horarios</option>';
            });
    }

    // Initialize Flatpickr
    let maxDateLimits = new Date();
    maxDateLimits.setDate(maxDateLimits.getDate() + 30); // 30 days max limit rule
    
    flatpickr(fechaInput, {
        locale: "es",
        minDate: "today",
        maxDate: maxDateLimits,
        altInput: true,
        altFormat: "d \\de F Y",
        dateFormat: "Y-m-d",
        onChange: function(selectedDates, dateStr, instance) {
            cargarHorarios(dateStr);
        }
    });
});
</script>
{% endblock %}
