{% extends 'base.html' %}
{% block content %}
<div class="max-w-lg mx-auto mt-10">
    <div class="bg-gray-900/50 border border-red-900/50 rounded-2xl p-8 text-center">
        <div class="w-16 h-16 bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-white mb-2">¿Eliminar cancha?</h2>
        <p class="text-gray-400 mb-2">
            Vas a eliminar permanentemente <span class="text-white font-bold">{{ cancha.nombre }}</span>.
        </p>
        <p class="text-red-400 text-sm mb-8">
            Esta acción también eliminará todas las reservas asociadas. No se puede deshacer.
        </p>
        <form method="POST" class="flex gap-4">
            {% csrf_token %}
            <a href="{% url 'canchas:detalle' cancha.pk %}"
               class="flex-1 py-3 rounded-xl border border-gray-700 text-gray-300
                      hover:bg-gray-800 transition font-medium">
                Cancelar
            </a>
            <button type="submit"
                    class="flex-1 py-3 rounded-xl bg-red-900/40 border border-red-800
                           text-red-400 hover:bg-red-900/70 hover:text-red-300 transition font-bold">
                Sí, eliminar
            </button>
        </form>
    </div>
</div>
{% endblock %}
