{% extends 'base.html' %}
{% block title %}Deporte (Admin){% endblock %}
{% block content %}
<div class="max-w-md mx-auto space-y-6">
    <h2 class="text-2xl font-bold text-white border-b border-gray-800 pb-4">Gestión de Deporte</h2>
    <form method="post" class="bg-gray-900 border border-gray-800 p-6 rounded-xl space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="block text-gray-400 text-sm mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <div class="pt-4 flex gap-3">
            <button type="submit" class="bg-neon text-dark font-bold px-4 py-2 rounded hover:bg-green-400 transition">Guardar</button>
            <a href="{% url 'canchas:admin_deporte_list' %}" class="bg-gray-800 text-white font-bold px-4 py-2 rounded hover:bg-gray-700 transition">Cancelar</a>
        </div>
    </form>
</div>
<script>
    document.querySelectorAll('input:not([type="checkbox"]):not([type="file"]), select, textarea').forEach(el => {
        el.classList.add('w-full', 'bg-gray-800', 'border', 'border-gray-700', 'text-white', 'px-3', 'py-2', 'rounded', 'focus:border-neon', 'focus:outline-none');
    });
</script>
{% endblock %}
