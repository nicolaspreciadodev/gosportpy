{% extends 'base.html' %}
{% block title %}Eliminar Cancha{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-20 text-center space-y-6 bg-gray-900 border border-red-500/30 p-8 rounded-xl shadow-[0_0_20px_rgba(239,68,68,0.1)]">
    <svg class="w-16 h-16 text-red-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
    <h2 class="text-2xl font-bold text-white">¿Estás seguro?</h2>
    <p class="text-gray-400">Vas a eliminar la cancha <span class="font-bold text-white">{{ object.nombre }}</span>. Se borrarán todas sus disponibilidades, reservas, calificaciones e historiales asociados.</p>
    
    <form method="post" class="flex justify-center gap-4 pt-4">
        {% csrf_token %}
        <a href="{% url 'canchas:admin_cancha_list' %}" class="px-6 py-2 bg-gray-800 border border-gray-700 text-white rounded font-bold hover:bg-gray-700">Cancelar</a>
        <button type="submit" class="px-6 py-2 bg-red-500/20 text-red-500 border border-red-500/50 rounded font-bold hover:bg-red-500 hover:text-white transition">Sí, Eliminar</button>
    </form>
</div>
{% endblock %}
