{% extends 'base.html' %}

{% block title %}Pago Rechazado - GoSport{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 p-8 bg-gray-800 rounded-xl shadow-2xl border border-red-500/30 text-center">
    <div class="inline-flex items-center justify-center w-20 h-20 bg-red-500/20 rounded-full mb-6 text-red-500">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </div>
    
    <h1 class="text-3xl font-black text-white mb-2">Pago No Procesado</h1>
    <p class="text-gray-400 mb-8">Lo sentimos, Mercado Pago ha rechazado la transacción. Por favor, verifica el límite de tus fondos o intenta con otro medio de pago admitido.</p>
    
    <div class="flex justify-center gap-4">
        <a href="{% url 'dashboard' %}" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded transition-colors focus:ring-2 focus:ring-gray-400 focus:outline-none">
            Volver al Panel
        </a>
    </div>
</div>
{% endblock %}
