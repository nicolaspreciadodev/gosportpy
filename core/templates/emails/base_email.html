<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GoSport</title>
    <style>
        body { font-family: 'Inter', Arial, sans-serif; background-color: #111827; color: #f3f4f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background-color: #1f2937; padding: 30px; border-radius: 8px; border-top: 4px solid #10b981; }
        .header { text-align: center; margin-bottom: 25px; }
        .logo { font-size: 28px; font-weight: bold; color: #10b981; text-decoration: none; }
        .content { font-size: 16px; line-height: 1.6; }
        .button { display: inline-block; background-color: #10b981; color: #111827; font-weight: bold; text-decoration: none; padding: 12px 24px; border-radius: 6px; margin-top: 20px; text-align: center; }
        .footer { margin-top: 30px; font-size: 13px; color: #6b7280; text-align: center; border-top: 1px solid #374151; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="#" class="logo">GO<span style="color: #f3f4f6;">SPORT</span></a>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            &copy; 2026 GoSport. Todos los derechos reservados.<br>
            Este es un correo automático, por favor no respondas.
        </div>
    </div>
</body>
</html>
